"main.py" = "<- メインの実行ファイル"
"requirements.txt" = "<- 依存ライブラリ（pip）一覧"
"venv" = "<- Python仮想環境（作成済み）"
".venv" = "<- Python仮想環境（作成済み）"

# --- その他共通・定番ファイル ---
