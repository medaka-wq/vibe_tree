# vibe_tree_config.toml

[settings]
# 【完全非表示】 存在すらツリーから消し去りたいフォルダ・ファイル
# 「念のためバックアップ」を緊急避難させました
hide_dirs = [
    "__pycache__", 
    "退避", 
    "念のためバックアップ", 
    ".git", 
    ".vscode", 
    ".idea", 
    ".pytest_cache", 
    "build", 
    "dist"
]

# 【下層隠し】 フォルダ名は出すけど、中身は非表示にしたいフォルダ
exclude_dirs = [
    "venv", 
    ".venv", 
    "node_modules", 
    "docs", 
    "assets"
]

# 【拡張子除外】 画面を汚す不要なファイルや、つい作ってしまう「.old」
exclude_exts = [
    ".pyc", 
    ".pyd", 
    ".pyo", 
    ".DS_Store", 
    "Thumbs.db", 
    ".log",
    ".old"
]

[comments]
